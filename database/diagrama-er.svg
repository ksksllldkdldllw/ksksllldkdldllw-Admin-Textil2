  <circle cx="430" cy="310" r="6" fill="#1d4ed8"/>
  <circle cx="670" cy="310" r="6" fill="#1d4ed8"/>
  <circle cx="970" cy="320" r="6" fill="#1d4ed8"/>
  <circle cx="850" cy="540" r="6" fill="#1d4ed8"/>

  <text x="600" y="740" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#4b5563">Relaciones principales: ventas, compras, productos y clientes</text>
